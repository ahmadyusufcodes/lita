name: Build Desktop Artifacts

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (x64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage deb
            artifact_name: lita-light-linux-x64
          - name: Windows (x64)
            os: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: msi nsis
            artifact_name: lita-light-windows-x64
          - name: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: app dmg
            artifact_name: lita-light-macos-intel
          - name: macOS Apple Silicon
            os: macos-15
            target: aarch64-apple-darwin
            bundles: app dmg
            artifact_name: lita-light-macos-apple-silicon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri bundles (Unix)
        if: runner.os != 'Windows'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build Tauri bundles (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
